<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column;
         align-items: center; justify-content: center; height: 100vh; gap: 16px; }
  #preview { width: 100%; max-width: 400px; display: none; }
  #status { color: #0f0; font-family: monospace; font-size: 14px;
            padding: 8px; text-align: center; width: 100%; }
  .btn { padding: 14px 32px; font-size: 16px; font-weight: bold;
         border: none; border-radius: 8px; cursor: pointer; width: 80%; }
  #openCamera { background: #0f0; color: #000; }
  #sendBtn { background: #00f; color: #fff; display: none; }
  input[type=file] { display: none; }
</style>
</head>
<body>
<div id="status">Press button to take photo</div>
<img id="preview">
<button class="btn" id="openCamera">Take Photo</button>
<button class="btn" id="sendBtn">Send to Watch</button>
<input type="file" id="fileInput" accept="image/*" capture="environment">
<script>
var WATCH_W = 200;
var WATCH_H = 228;
var CMD_FRAME_START = 3;
var CMD_FRAME_CHUNK = 2;
var CMD_FRAME_END   = 4;
var status = document.getElementById('status');
var preview = document.getElementById('preview');
var sendBtn = document.getElementById('sendBtn');
var fileInput = document.getElementById('fileInput');
var capturedDataUrl = null;

document.getElementById('openCamera').addEventListener('click', function() {
  fileInput.click();
});

fileInput.addEventListener('change', function() {
  var file = fileInput.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    capturedDataUrl = e.target.result;
    preview.src = capturedDataUrl;
    preview.style.display = 'block';
    sendBtn.style.display = 'block';
    status.textContent = 'Photo ready - send to watch or save';
  };
  reader.readAsDataURL(file);
});

sendBtn.addEventListener('click', function() {
  if (!capturedDataUrl) return;
  status.textContent = 'Sending to watch...';
  sendBtn.disabled = true;

  // Draw to downscaled canvas and send
  var img = new Image();
  img.onload = function() {
    var canvas = document.createElement('canvas');
    canvas.width = WATCH_W;
    canvas.height = WATCH_H;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, WATCH_W, WATCH_H);
    var imageData = ctx.getImageData(0, 0, WATCH_W, WATCH_H);
    var pixels = imageData.data;
    var packed = new Uint8Array(WATCH_W * WATCH_H);
    for (var i = 0; i < WATCH_W * WATCH_H; i++) {
      var r = pixels[i*4]   >> 6;
      var g = pixels[i*4+1] >> 6;
      var b = pixels[i*4+2] >> 6;
      packed[i] = (r << 4) | (g << 2) | b;
    }
    var b64 = btoa(String.fromCharCode.apply(null, packed));
    sendChunked(b64);

    // Also save full res
    var link = document.createElement('a');
    link.href = capturedDataUrl;
    link.download = 'pebble-' + Date.now() + '.jpg';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };
  img.src = capturedDataUrl;
});

function sendChunked(b64) {
  Pebble.sendAppMessage({ CMD: CMD_FRAME_START }, function() {}, function() {});
  var chunkSize = 100;
  var offset = 0;
  function sendNext() {
    if (offset >= b64.length) {
      Pebble.sendAppMessage({ CMD: CMD_FRAME_END },
        function() {
          status.textContent = 'Sent to watch!';
          sendBtn.disabled = false;
        },
        function() {
          status.textContent = 'Send failed - try again';
          sendBtn.disabled = false;
        }
      );
      return;
    }
    var chunk = b64.slice(offset, offset + chunkSize);
    offset += chunkSize;
    Pebble.sendAppMessage(
      { CMD: CMD_FRAME_CHUNK, DATA: chunk },
      sendNext,
      function() { sendNext(); }
    );
  }
  sendNext();
}
</script>
</body>
</html>
